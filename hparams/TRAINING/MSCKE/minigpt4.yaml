# Model
device: 5

name: hugging_cache/Vicuna
model_name: minigpt4
model_class: Blip2OPT
small_name: hugging_cache/Vicuna
tokenizer_class: LlamaTokenizer
tokenizer_name: hugging_cache/Vicuna
cls_class: CLIPModel
cls_processor_class: CLIPProcessor
cls_name: hugging_cache/clip-vit-large-patch14
emb_type: get_features
fusion_type: dot
inner_params:
- llama_model.model.layers.29.mlp.down_proj.weight
- llama_model.model.layers.29.mlp.up_proj.weight
- llama_model.model.layers.30.mlp.down_proj.weight
- llama_model.model.layers.30.mlp.up_proj.weight
- llama_model.model.layers.31.mlp.down_proj.weight
- llama_model.model.layers.31.mlp.up_proj.weight

# Method
alg: MSCKE
lr: 1e-5
edit_lr: 1e-2
seed: 0
lr_lr: 0.0
cedit: 0.1
iedit: 0.1
cloc: 1.0
cbase: 1.0
dropout: 0.0
final_eval: True
supervised: True
train_base: False
no_grad_layers: null
soft_weighting: False
checkpoint_grad: False
cross_attend: False
cos: False
freeze: null
square: True
bound_embeds: False
use_all_negatives: False
freeze_cntr: False
dist_heads: 1
lora: null
archive: null
cls_loss: 1.0
edit_loss: 0.0
iloc_loss: 1
igen_loss: 1

batch_size: 1
model_save_pt: 2000
edit_bs: 1
silent: False
#max_epochs: 1
max_iters: 20000
log_interval: 200
val_interval: 2000
early_stop_patience: 30000
early_stop_key: "loss/total_edit_val"
eval_only: False
half: False
save: False
debug: False
log_errors: False
unlikelihood: True

val_batch_size: 1
accumulate_bs: 1
val_steps: 1000
opt: Adam
grad_clip: 100.

# Output
results_dir: ./results/MSCKE/minigpt4

# Multimodal
exact_match: True
qformer_checkpoint: hugging_cache/blip2_pretrained_flant5xxl.pth
qformer_name_or_path: hugging_cache/bert-base-uncased
state_dict_file: hugging_cache/eva_vit_g.pth
pretrained_ckpt: hugging_cache/pretrained_minigpt4_7b.pth

# image
coco_image: data/images
rephrase_image: data/images
